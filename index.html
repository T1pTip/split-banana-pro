<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="בנה פרומפטים לתמונות AI — בחר סגנון, אווירה, תאורה ועוד. Build AI image prompts in Hebrew and English.">
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#08080f">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>Palette AI 🎨</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080f;
  --surface: #0f0f1a;
  --surface2: #16162a;
  --border: rgba(255,255,255,0.07);
  --accent: #007aff;
  --teal: #00e5cc;
  --a1: rgba(0,122,255,0.05);
  --a2: rgba(0,122,255,0.15);
  --a3: rgba(0,122,255,0.28);
  --a4: rgba(0,122,255,0.45);
  --text: #e8e8f0;
  --muted: #6b6b88;
  --r: 12px;
  --r-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rubik', system-ui, -apple-system, Arial, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
.header {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  position: -webkit-sticky;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,8,15,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.header-title { font-size: 16px; font-weight: 700; color: #fff; white-space: nowrap; flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; width: 100%; }
.header-bottom { display: flex; align-items: center; gap: 8px; width: 100%; }
.header-subtitle { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.search-wrap { position: relative; flex: 1; max-width: 200px; min-width: 100px; }
.search-icon { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; color: var(--muted); pointer-events: none; }
#search { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-family: 'Rubik', system-ui, -apple-system, Arial, sans-serif; font-size: 13px; padding: 6px 28px 6px 10px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
#search::placeholder { color: var(--muted); }
#search:focus { border-color: var(--a4); }
.lang-toggle { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.lang-btn { background: transparent; border: none; color: var(--muted); font-family: 'Rubik', system-ui, -apple-system, Arial, sans-serif; font-size: 11px; font-weight: 600; padding: 5px 8px; min-height: 36px; cursor: pointer; transition: all 0.15s; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
.lang-btn.active { background: var(--accent); color: #fff; }
.app { display: grid; grid-template-columns: 1fr; }
@media (min-width: 768px) { .app { grid-template-columns: minmax(0,1fr) minmax(0,1fr); align-items: start; } }
@media (min-width: 1200px) { .app { grid-template-columns: minmax(0,1.3fr) minmax(0,1fr); } }
.right-col { padding: 14px; display: flex; flex-direction: column; gap: 10px; order: 3; }
@media (min-width: 768px) { .right-col { order: 2; border-left: 1px solid var(--border); position: -webkit-sticky; position: sticky; top: 55px; max-height: calc(100vh - 55px); overflow-y: auto; -webkit-overflow-scrolling: touch; } }
.left-col { padding: 14px; display: flex; flex-direction: column; gap: 10px; order: 1; }
@media (min-width: 768px) { .left-col { order: 1; position: -webkit-sticky; position: sticky; top: 55px; max-height: calc(100vh - 55px); overflow-y: auto; -webkit-overflow-scrolling: touch; } }
.cat-section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 2px; }
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 6px; }
@media (min-width: 480px) { .cat-grid { grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); } }
.cat-pill { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 4px 7px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); cursor: pointer; transition: border-color 0.15s, background 0.15s; touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; position: relative; text-align: center; }
.cat-pill:active { opacity: 0.8; }
.cat-pill.active { background: var(--a2); border-color: var(--a4); }
.cat-emoji { font-size: 20px; line-height: 1; }
.cat-name { font-size: 9px; font-weight: 500; color: var(--muted); line-height: 1.2; word-break: break-word; hyphens: auto; }
.cat-pill.active .cat-name { color: #a8c8ff; }
.cat-badge { position: absolute; top: 5px; left: 5px; background: var(--accent); color: #fff; font-size: 9px; font-weight: 700; border-radius: 99px; padding: 1px 5px; display: none; min-width: 16px; text-align: center; }
.cat-badge.on { display: block; }
.tag-panel { background: var(--surface); border: 1px solid var(--a2); border-radius: var(--r); overflow: hidden; display: none; animation: panelIn 0.15s ease; }
@keyframes panelIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.tag-panel.open { display: block; }
.tag-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--a1); }
.tag-panel-title { font-size: 13px; font-weight: 600; color: var(--text); }
.tag-panel-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 0 2px; line-height: 1; touch-action: manipulation; }
.tag-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 7px; padding: 12px; }
.tag-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text); padding: 9px 11px; border-radius: var(--r-sm); cursor: pointer; font-family: 'Rubik', system-ui, -apple-system, Arial, sans-serif; font-size: 12px; font-weight: 500; text-align: right; transition: all 0.15s; display: flex; flex-direction: column; gap: 2px; min-height: 44px; touch-action: manipulation; -webkit-tap-highlight-color: transparent; line-height: 1.3; }
.tag-btn:active { opacity: 0.8; }
.tag-btn-sub { font-size: 10px; color: var(--muted); font-weight: 400; }
.tag-btn.active { background: var(--a3); border-color: #007aff; border-width: 1.5px; color: #fff; box-shadow: 0 0 8px var(--a2); }
.tag-btn.active .tag-btn-sub { color: rgba(255,255,255,0.5); }
[dir="ltr"] .tag-btn { text-align: left; }
#userInput { width: 100%; min-height: 100px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); padding: 12px 14px; font-family: 'Rubik', system-ui, -apple-system, Arial, sans-serif; font-size: 16px !important; line-height: 1.6; outline: none; resize: none; transition: border-color 0.2s; -webkit-appearance: none; }
#userInput::placeholder { color: var(--muted); }
#userInput:focus { border-color: var(--a4); }
.chips-wrap { display: flex; flex-wrap: wrap; gap: 5px; min-height: 4px; }
.sel-chip { background: var(--a2); border: 1px solid var(--a3); color: #a8c8ff; font-size: 11px; font-weight: 500; padding: 5px 10px 5px 7px; border-radius: 99px; display: flex; align-items: center; gap: 4px; cursor: pointer; animation: chipIn 0.12s ease; touch-action: manipulation; min-height: 30px; }
@keyframes chipIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
.sel-chip-x { opacity: 0.45; font-size: 13px; }
.result-box { background: var(--surface); border: 1px solid var(--a2); border-radius: var(--r); overflow: hidden; }
.result-top { display: flex; align-items: center; justify-content: space-between; padding: 9px 13px; border-bottom: 1px solid var(--border); background: var(--a1); }
.result-label-wrap { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; }
.result-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
#charCount { font-size: 11px; color: var(--muted); }
#finalPrompt { padding: 12px 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.7; color: var(--teal); min-height: 70px; white-space: pre-wrap; word-break: break-word; }
.action-row { display: flex; gap: 7px; }
.btn-copy { flex: 1; background: var(--accent); color: #fff; border: none; border-radius: var(--r-sm); padding: 11px 14px; font-family: 'Rubik', system-ui, -apple-system, Arial, sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: opacity 0.15s; touch-action: manipulation; -webkit-tap-highlight-color: transparent; min-height: 44px; }
.btn-share{display:flex;align-items:center;gap:6px;background:#25d366;color:#fff;border:none;border-radius:var(--r-sm);padding:11px 14px;font-family:'Rubik',system-ui,-apple-system,Arial,sans-serif;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;white-space:nowrap;transition:all .15s;min-height:40px}
.btn-share:active{transform:scale(.96);background:#1ebe5d}
.btn-share:disabled{opacity:0.4;cursor:default}
.btn-copy:active { opacity: 0.85; }
.btn-copy.copied { background: #1a8a3a; }
.btn-clear { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.22); color: #b0b0cc; border-radius: var(--r-sm); padding: 11px 16px; font-family: 'Rubik', system-ui, -apple-system, Arial, sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; touch-action: manipulation; -webkit-tap-highlight-color: transparent; min-height: 44px; white-space: nowrap; }
.btn-clear:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.35); color: #d0d0e8; }
.btn-clear:active { background: rgba(255,255,255,0.1); }
/* ── PayBox Donation Button ─────────────────────── */
.btn-paybox{display:flex;align-items:center;gap:12px;width:100%;background:linear-gradient(135deg,#1a0e00,#2a1800);border:1px solid rgba(218,165,32,0.28);border-radius:var(--r);padding:11px 16px;cursor:pointer;transition:all .2s;min-height:52px;margin-top:2px;font-family:'Rubik',system-ui,-apple-system,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
.btn-paybox:hover{border-color:rgba(218,165,32,0.55);background:linear-gradient(135deg,#1e1100,#301c00)}
.btn-paybox:active{transform:scale(.98);opacity:.9}
.btn-paybox-emoji{font-size:22px;line-height:1;flex-shrink:0}
.btn-paybox-text{display:flex;flex-direction:column;flex:1;text-align:right}
.btn-paybox-title{font-size:13px;font-weight:600;color:#ffd700;letter-spacing:.2px}
.btn-paybox-sub{font-size:10px;color:rgba(255,215,0,0.5);margin-top:2px}
.btn-paybox-badge{font-size:11px;font-weight:700;color:rgba(218,165,32,0.75);border:1px solid rgba(218,165,32,0.3);border-radius:6px;padding:3px 8px;flex-shrink:0}
[dir="ltr"] .btn-paybox-text{text-align:left}
#finalPrompt.prompt-empty { color: var(--muted); font-family: 'Rubik', system-ui, -apple-system, Arial, sans-serif; font-size: 13px; }
#finalPrompt.prompt-ready { color: var(--teal); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.install-banner { display: none; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 14px; background: linear-gradient(135deg, rgba(0,122,255,0.15), rgba(0,229,204,0.08)); border-bottom: 1px solid var(--border); animation: slideDown 0.3s ease; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.install-banner.show { display: flex; }
.install-text { font-size: 12px; color: var(--text); line-height: 1.4; flex: 1; }
.install-text strong { color: #fff; font-weight: 600; }
.install-actions { display: flex; gap: 6px; flex-shrink: 0; }
.install-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 6px 14px; font-family: 'Rubik', system-ui, -apple-system, Arial, sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; touch-action: manipulation; white-space: nowrap; }
.install-dismiss { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 10px; font-family: 'Rubik', system-ui, -apple-system, Arial, sans-serif; font-size: 12px; cursor: pointer; touch-action: manipulation; }
.ios-hint { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; font-size: 12px; color: var(--text); text-align: center; line-height: 1.5; z-index: 999; max-width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: slideUp 0.3s ease; }
@keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
.ios-hint.show { display: block; }
.ios-hint-close { display: block; margin-top: 8px; color: var(--accent); cursor: pointer; font-weight: 600; }
.tag-hidden { display: none !important; }
@supports (padding-bottom: env(safe-area-inset-bottom)) { .app { padding-bottom: env(safe-area-inset-bottom); } }
.hist-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--muted);font-size:17px;padding:5px 9px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height: 44px;min-width: 44px;line-height:1}
.hist-btn:active{opacity:.7}
.hist-panel{display:none;background:var(--surface);border:1px solid var(--a2);border-radius:var(--r);overflow:hidden;margin-top:6px;animation:panelIn .15s ease}
.hist-panel.open{display:block}
.hist-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--a1);font-size:12px;font-weight:600;color:var(--muted)}
.hist-clear{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;touch-action:manipulation;min-height: 30px;padding:4px 6px}
.hist-item{padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;min-height: 44px;touch-action:manipulation}
.hist-item:last-child{border-bottom:none}
.hist-item:active{background:var(--a1)}
.hist-text{font-size:11px;color:var(--text);font-family:"JetBrains Mono",monospace;line-height:1.4}
.hist-time{font-size:10px;color:var(--muted);margin-top:2px}
.hist-empty{padding:16px 12px;font-size:12px;color:var(--muted);text-align:center}
.onboarding{display:none;background:rgba(0,122,255,.08);border:1px solid var(--a2);border-radius:var(--r);padding:11px 13px;margin:6px 0}
.onboarding.show{display:flex;align-items:flex-start;gap:10px;animation:slideDown .3s ease}
.ob-steps{display:flex;flex-wrap:wrap;gap:8px;flex:1}
.ob-step{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text)}
.ob-num{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ob-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:0 3px;touch-action:manipulation;min-height: 30px;flex-shrink:0}
.btn-rnd{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);font-size:18px;padding:5px 9px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height: 44px;min-width: 44px;line-height:1;transition:transform .15s}
.btn-rnd:active{transform:scale(.88)}
.ar-row{display:flex;align-items:center;gap:5px}
.ar-lbl{font-size:11px;color:var(--muted);font-weight:500;flex-shrink:0}
.ar-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--muted);font-size:11px;font-weight:600;padding:5px 9px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height: 36px;white-space:nowrap;transition:all .15s}
.ar-btn.active{background:var(--a3);border-color:var(--accent);color:#fff}
.ar-btn:active{opacity:.8}
.tok-warn{color:#ffaa00}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(20,20,40,.97);color:#fff;font-size:13px;font-weight:500;padding:11px 20px;border-radius:14px;opacity:0;pointer-events:none;transition:all .25s;z-index:9999;white-space:nowrap;border:1px solid var(--a2);box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.toast-err{background:rgba(180,40,40,.97)}
#toast.toast-deep{background:rgba(0,100,60,.97);border-color:rgba(0,200,120,.3)}
.random-divider{order:2;display:flex;align-items:center;justify-content:center;padding:6px 14px 4px;gap:10px;direction:ltr}
.random-divider::before,.random-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.random-divider > div{direction:ltr}
.btn-split-wrap{display:flex;align-items:stretch;border-radius:14px;overflow:hidden;border:1.5px solid var(--a3);background:var(--surface2);box-shadow:0 2px 14px rgba(0,0,0,0.3);transition:box-shadow .2s}
.btn-split-wrap:hover{box-shadow:0 4px 22px rgba(0,122,255,0.12)}
.btn-split-kids{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:10px 18px;min-width:72px;min-height:54px;cursor:pointer;background:linear-gradient(145deg,rgba(255,210,60,0.08),rgba(255,140,0,0.04));border:none;border-left:1.5px solid rgba(255,200,60,0.12);color:rgba(255,220,100,0.4);touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:all .2s}
.btn-split-kids.mode-active{background:linear-gradient(145deg,rgba(255,210,60,0.28),rgba(255,140,0,0.16));border-left-color:rgba(255,200,60,0.4);color:#ffe566}
.btn-split-kids:active{transform:scale(0.97)}
.btn-split-kids .kids-icon{font-size:24px;line-height:1;filter:drop-shadow(0 0 3px rgba(255,210,60,0.2));transition:all 0.2s}
.btn-split-kids.mode-active .kids-icon{filter:drop-shadow(0 0 10px rgba(255,210,60,0.8))}
.btn-split-kids .kids-title{font-size:11px;font-weight:700;letter-spacing:0.3px;white-space:nowrap}
.btn-split-kids .kids-sub{font-size:9px;color:rgba(255,220,100,0.4);white-space:nowrap;transition:color .2s}
.btn-split-kids.mode-active .kids-sub{color:rgba(255,220,100,0.75)}
.btn-rnd-main{display:flex;align-items:center;gap:8px;background:transparent;border:none;color:var(--text);font-size:14px;font-weight:500;padding:10px 22px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height:54px;white-space:nowrap;transition:background .15s}
.btn-rnd-main:active{background:var(--a2)}
.btn-split-adults{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:10px 18px;min-width:72px;min-height:54px;cursor:pointer;background:linear-gradient(145deg,rgba(0,122,255,0.12),rgba(0,200,200,0.06));border:none;border-right:1.5px solid rgba(0,122,255,0.15);color:rgba(100,180,255,0.5);touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:all .2s}
.btn-split-adults.mode-active{background:linear-gradient(145deg,rgba(0,122,255,0.26),rgba(0,200,200,0.12));border-right-color:rgba(0,122,255,0.4);color:var(--accent)}
.btn-split-adults:active{transform:scale(0.97)}
.btn-split-adults .adults-icon{font-size:22px;line-height:1;transition:all 0.2s}
.btn-split-adults .adults-title{font-size:11px;font-weight:700;white-space:nowrap;letter-spacing:0.3px}
.btn-split-adults .adults-sub{font-size:9px;color:rgba(100,180,255,0.4);white-space:nowrap;transition:color .2s}
.btn-split-adults.mode-active .adults-sub{color:rgba(100,180,255,0.8)}
.format-row{display:flex;justify-content:flex-start;gap:5px;padding:4px 14px 0;order:2}
.fmt-btn{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:99px;color:var(--text);font-size:12px;font-weight:500;padding:7px 14px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height: 38px;transition:all .15s;white-space:nowrap}
.fmt-btn.active{background:var(--a2);border-color:var(--accent);color:#a8c8ff}
.fmt-btn:active{opacity:.8}
.cm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.cm-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:340px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.cm-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px}
.cm-msg{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.cm-tags{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;max-height:180px;overflow-y:auto}
.cm-tag-row{background:var(--surface2);border-radius:8px;padding:7px 10px;display:flex;flex-direction:column;gap:2px}
.cm-tag-name{font-size:12px;font-weight:500;color:var(--text)}
.cm-tag-kw{font-size:11px;color:var(--muted)}
.cm-btns{display:flex;gap:8px}
.cm-btn{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;min-height:40px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.cm-yes{background:#1a4a2e;color:#4ade80;border:1px solid #2d6b42}
.cm-yes:active{opacity:.8}
.cm-no{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.cm-no:active{opacity:.8}
.clr-box{max-width:300px}
.clr-btns{display:flex;flex-direction:column;gap:8px}
.clr-btn{width:100%;padding:11px 14px;border-radius:10px;border:0.5px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;text-align:right;min-height:44px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;background:var(--surface2);color:var(--text);transition:opacity .15s}
.clr-btn:active{opacity:.7}
[dir="ltr"] .clr-btn{text-align:left}
.clr-all{border-color:#7f1d1d;color:#f87171;background:#1c0a0a}
.clr-cancel{color:var(--muted);font-weight:400}
</style>
</head>
<body>

<div class="install-banner" id="installBanner">
  <div class="install-text">
    <strong>Palette AI 🎨</strong><br>
    <span id="installMsg">הוסף למסך הבית לגישה מהירה</span>
  </div>
  <div class="install-actions">
    <button class="install-btn" id="installBtn" onclick="doInstall()"></button>
    <button class="install-dismiss" onclick="dismissInstall()">✕</button>
  </div>
</div>
<div class="ios-hint" id="iosHint">
  <span id="iosHintText">לחץ על <strong>□↑</strong> ואז "הוסף למסך הבית"</span>
  <span class="ios-hint-close" onclick="$('iosHint').classList.remove('show')">סגור</span>
</div>

<header class="header">
  <div class="header-top">
    <span class="header-title">Palette AI 🎨</span>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnHE" onclick="setLang('he')">עברית</button>
      <button class="lang-btn" id="btnEN" onclick="setLang('en')">English</button>
    </div>
  </div>
  <div class="header-bottom">
    <span class="header-subtitle" id="headerSubtitle"></span>
    <div class="search-wrap">
      <input type="search" id="search" autocomplete="off" oninput="filterTags()" />
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </div>
  </div>
</header>

<div class="app">
  <div class="right-col">
    <textarea id="userInput" rows="4"></textarea>
    <div class="chips-wrap" id="selectedBar"></div>
    <div class="result-box">
      <div class="result-top">
        <div class="result-label-wrap">
          <div class="result-dot"></div>
          <button class="hist-btn" onclick="toggleHistPanel()" title="היסטוריה">🕐</button>
          <div class="hist-panel" id="histPanel">
            <div class="hist-header">
              <span id="histTitle">היסטוריה</span>
              <button class="hist-clear" onclick="clearHistory()" id="histClear">נקה</button>
            </div>
            <div id="historyList"></div>
          </div>
          <span id="resultLabel"></span>
        </div>
        <span id="charCount"></span>
      </div>
      <div id="finalPrompt"></div>
    </div>
    <div class="action-row">
      <button class="btn-copy" id="copyBtn" onclick="copyPrompt()">
        <span id="copyIcon">📋</span>
        <span id="copyText"></span>
      </button>
      <button class="btn-share" id="shareBtn" onclick="sharePrompt()" disabled>
        <span id="shareIcon">📤</span>
        <span id="shareText"></span>
      </button>
      <button class="btn-clear" id="clearBtn" onclick="clearAll()"></button>
    </div>
    <button class="btn-paybox" id="payboxBtn" onclick="doPayBox()">
      <span class="btn-paybox-emoji">🍺</span>
      <div class="btn-paybox-text">
        <span class="btn-paybox-title" id="payboxTitle">פנק אותי בבירה</span>
        <span class="btn-paybox-sub">תשלום מאובטח · PayBox</span>
      </div>
      <span class="btn-paybox-badge">PayBox</span>
    </button>
  </div>
  <div class="format-row">
    <button class="fmt-btn" data-ar="--ar 9:16" onclick="setAR('--ar 9:16')">📱 <span id="fmtStory">סטורי</span></button>
    <button class="fmt-btn" data-ar="--ar 1:1" onclick="setAR('--ar 1:1')">⬜ <span id="fmtSquare">ריבוע</span></button>
    <button class="fmt-btn" data-ar="--ar 16:9" onclick="setAR('--ar 16:9')">🖼️ <span id="fmtWide">רחב</span></button>
  </div>
  <div class="random-divider">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div class="btn-split-wrap">
        <button class="btn-split-kids" id="kidsBtn" onclick="setKidsMode(true)">
          <span class="kids-icon">✨</span>
          <span class="kids-title" id="kidsBtnTitle">כפתור לילדים</span>
          <span class="kids-sub" id="kidsBtnSub">מצב קסום</span>
        </button>
        <button class="btn-rnd-main" id="randomBtn" onclick="randomize()">
          🎲 <span id="randomBtnLabel">הפתע/י אותי</span>
        </button>
        <button class="btn-split-adults mode-active" id="adultsBtn" onclick="setKidsMode(false)">
          <span class="adults-icon">🎨</span>
          <span class="adults-title" id="adultsBtnTitle">מצב מבוגרים</span>
          <span class="adults-sub" id="adultsBtnSub">כל הקטגוריות</span>
        </button>
      </div>
      <span id="randomHint" style="font-size:10px;color:var(--muted);opacity:0;visibility:hidden;transition:opacity 0.2s;"></span>
    </div>
  </div>
  <div class="left-col">
    <div class="onboarding" id="onboarding">
      <div class="ob-steps">
        <div class="ob-step"><div class="ob-num">1</div><span id="ob1">בחר/י קטגוריה</span></div>
        <div class="ob-step"><div class="ob-num">2</div><span id="ob2">בחר/י תגיות</span></div>
        <div class="ob-step"><div class="ob-num">3</div><span id="ob3">תאר/י וצור/י</span></div>
      </div>
      <button class="ob-close" onclick="dismissOnboarding()">✕</button>
    </div>
    <div class="cat-grid" id="catGrid"></div>
    <div class="tag-panel" id="tagPanel">
      <div class="tag-panel-header">
        <span class="tag-panel-title" id="tagPanelTitle"></span>
        <button class="tag-panel-close" onclick="closePanel()">×</button>
      </div>
      <div class="tag-list" id="tagList"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>

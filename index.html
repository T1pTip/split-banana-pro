<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#08080f">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>Split Banana 🍌</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080f;
  --surface: #0f0f1a;
  --surface2: #16162a;
  --border: rgba(255,255,255,0.07);
  --accent: #007aff;
  --teal: #00e5cc;
  --a1: rgba(0,122,255,0.05);
  --a2: rgba(0,122,255,0.15);
  --a3: rgba(0,122,255,0.28);
  --a4: rgba(0,122,255,0.45);
  --text: #e8e8f0;
  --muted: #6b6b88;
  --r: 12px;
  --r-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rubik', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Header ── */
.header {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  position: -webkit-sticky;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,8,15,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.header-title {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  flex-shrink: 0;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}
.header-bottom {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
}
.header-subtitle {
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}
.search-wrap {
  position: relative;
  flex: 1;
  max-width: 200px;
  min-width: 100px;
}
.search-icon {
  position: absolute;
  right: 9px;
  top: 50%;
  transform: translateY(-50%);
  width: 13px;
  height: 13px;
  color: var(--muted);
  pointer-events: none;
}
#search {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text);
  font-family: 'Rubik', sans-serif;
  font-size: 13px;
  padding: 6px 28px 6px 10px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
#search::placeholder { color: var(--muted); }
#search:focus { border-color: var(--a4); }
.lang-toggle {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
}
.lang-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'Rubik', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 5px 8px;
  min-height: 36px;
  cursor: pointer;
  transition: all 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.lang-btn.active { background: var(--accent); color: #fff; }

/* ── App layout ── */
.app {
  display: grid;
  grid-template-columns: 1fr;
}
@media (min-width: 768px) {
  .app { grid-template-columns: minmax(0,1fr) minmax(0,1fr); align-items: start; }
}
@media (min-width: 1200px) {
  .app { grid-template-columns: minmax(0,1.3fr) minmax(0,1fr); }
}

/* ── Right col (prompt) — first on mobile, second on desktop ── */
.right-col {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  order: 3;
}
@media (min-width: 768px) {
  .right-col {
    order: 2;
    border-left: 1px solid var(--border);
    position: -webkit-sticky;
  position: sticky;
    top: 55px;
    max-height: calc(100vh - 55px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
}

/* ── Left col (categories) ── */
.left-col {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  order: 1;
}
@media (min-width: 768px) {
  .left-col {
    order: 1;
    position: -webkit-sticky;
  position: sticky;
    top: 55px;
    max-height: calc(100vh - 55px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
}

/* ── Category grid pills ── */
.cat-section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 2px;
}
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  gap: 6px;
}
@media (min-width: 480px) {
  .cat-grid { grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); }
}
.cat-pill {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 8px 4px 7px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  position: relative;
  text-align: center;
}
.cat-pill:active { opacity: 0.8; }
.cat-pill.active {
  background: var(--a2);
  border-color: var(--a4);
}
.cat-emoji { font-size: 20px; line-height: 1; }
.cat-name {
  font-size: 9px;
  font-weight: 500;
  color: var(--muted);
  line-height: 1.2;
  word-break: break-word;
  hyphens: auto;
}
.cat-pill.active .cat-name { color: #a8c8ff; }
.cat-badge {
  position: absolute;
  top: 5px;
  left: 5px;
  background: var(--accent);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  border-radius: 99px;
  padding: 1px 5px;
  display: none;
  min-width: 16px;
  text-align: center;
}
.cat-badge.on { display: block; }

/* ── Tag panel ── */
.tag-panel {
  background: var(--surface);
  border: 1px solid var(--a2);
  border-radius: var(--r);
  overflow: hidden;
  display: none;
  animation: panelIn 0.15s ease;
}
@keyframes panelIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.tag-panel.open { display: block; }

.tag-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--a1);
}
.tag-panel-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.tag-panel-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  touch-action: manipulation;
}

.tag-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 7px;
  padding: 12px;
}
.tag-btn {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 11px;
  border-radius: var(--r-sm);
  cursor: pointer;
  font-family: 'Rubik', sans-serif;
  font-size: 12px;
  font-weight: 500;
  text-align: right;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-height: 44px;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  line-height: 1.3;
}
.tag-btn:active { opacity: 0.8; }
.tag-btn-sub { font-size: 10px; color: var(--muted); font-weight: 400; }
.tag-btn.active {
  background: var(--a3);
  border-color: #007aff;
  border-width: 1.5px;
  color: #fff;
  box-shadow: 0 0 8px var(--a2);
}
.tag-btn.active .tag-btn-sub { color: rgba(255,255,255,0.5); }
[dir="ltr"] .tag-btn { text-align: left; }

/* ── Prompt area ── */
#userInput {
  width: 100%;
  min-height: 100px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  padding: 12px 14px;
  font-family: 'Rubik', sans-serif;
  font-size: 16px !important;
  line-height: 1.6;
  outline: none;
  resize: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
#userInput::placeholder { color: var(--muted); }
#userInput:focus { border-color: var(--a4); }

/* ── Chips ── */
.chips-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  min-height: 4px;
}
.sel-chip {
  background: var(--a2);
  border: 1px solid var(--a3);
  color: #a8c8ff;
  font-size: 11px;
  font-weight: 500;
  padding: 5px 10px 5px 7px;
  border-radius: 99px;
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  animation: chipIn 0.12s ease;
  touch-action: manipulation;
  min-height: 30px;
}
@keyframes chipIn {
  from { opacity: 0; transform: scale(0.85); }
  to   { opacity: 1; transform: scale(1); }
}
.sel-chip-x { opacity: 0.45; font-size: 13px; }

/* ── Result ── */
.result-box {
  background: var(--surface);
  border: 1px solid var(--a2);
  border-radius: var(--r);
  overflow: hidden;
}
.result-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 13px;
  border-bottom: 1px solid var(--border);
  background: var(--a1);
}
.result-label-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.7px;
}
.result-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--teal);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
#charCount { font-size: 11px; color: var(--muted); }
#finalPrompt {
  padding: 12px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
  color: var(--teal);
  min-height: 70px;
  white-space: pre-wrap;
  word-break: break-word;
}

/* ── Actions ── */
.action-row { display: flex; gap: 7px; }
.btn-copy {
  flex: 3;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--r-sm);
  padding: 11px 14px;
  font-family: 'Rubik', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: opacity 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
}
.btn-copy:active { opacity: 0.85; }
.btn-copy.copied { background: #1a8a3a; }
.btn-clear {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: var(--r-sm);
  padding: 11px 13px;
  font-family: 'Rubik', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
  white-space: nowrap;
}
.btn-clear:active { background: rgba(255,255,255,0.05); }



#finalPrompt.prompt-empty {
  color: var(--muted);
  font-family: 'Rubik', sans-serif;
  font-size: 13px;
}
#finalPrompt.prompt-ready {
  color: var(--teal);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
/* ── Install banner ── */
.install-banner {
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 14px;
  background: linear-gradient(135deg, rgba(0,122,255,0.15), rgba(0,229,204,0.08));
  border-bottom: 1px solid var(--border);
  animation: slideDown 0.3s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.install-banner.show { display: flex; }
.install-text {
  font-size: 12px;
  color: var(--text);
  line-height: 1.4;
  flex: 1;
}
.install-text strong { color: #fff; font-weight: 600; }
.install-actions { display: flex; gap: 6px; flex-shrink: 0; }
.install-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-family: 'Rubik', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  touch-action: manipulation;
  white-space: nowrap;
}
.install-dismiss {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 8px;
  padding: 6px 10px;
  font-family: 'Rubik', sans-serif;
  font-size: 12px;
  cursor: pointer;
  touch-action: manipulation;
}
/* iOS hint */
.ios-hint {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 12px;
  color: var(--text);
  text-align: center;
  line-height: 1.5;
  z-index: 999;
  max-width: 280px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.ios-hint.show { display: block; }
.ios-hint-close {
  display: block;
  margin-top: 8px;
  color: var(--accent);
  cursor: pointer;
  font-weight: 600;
}


.tag-hidden { display: none !important; }

@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .app { padding-bottom: env(safe-area-inset-bottom); }
}

/* ── History Panel ────────────────────────────────────── */
.hist-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--muted);font-size:17px;padding:5px 9px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height: 44px;min-width: 44px;line-height:1}
.hist-btn:active{opacity:.7}
.hist-panel{display:none;background:var(--surface);border:1px solid var(--a2);border-radius:var(--r);overflow:hidden;margin-top:6px;animation:panelIn .15s ease}
.hist-panel.open{display:block}
.hist-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--a1);font-size:12px;font-weight:600;color:var(--muted)}
.hist-clear{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;touch-action:manipulation;min-height: 30px;padding:4px 6px}
.hist-item{padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;min-height: 44px;touch-action:manipulation}
.hist-item:last-child{border-bottom:none}
.hist-item:active{background:var(--a1)}
.hist-text{font-size:11px;color:var(--text);font-family:"JetBrains Mono",monospace;line-height:1.4}
.hist-time{font-size:10px;color:var(--muted);margin-top:2px}
.hist-empty{padding:16px 12px;font-size:12px;color:var(--muted);text-align:center}

/* ── Onboarding ────────────────────────────────────────── */
.onboarding{display:none;background:rgba(0,122,255,.08);border:1px solid var(--a2);border-radius:var(--r);padding:11px 13px;margin:6px 0}
.onboarding.show{display:flex;align-items:flex-start;gap:10px;animation:slideDown .3s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.ob-steps{display:flex;flex-wrap:wrap;gap:8px;flex:1}
.ob-step{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text)}
.ob-num{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ob-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:0 3px;touch-action:manipulation;min-height: 30px;flex-shrink:0}

/* ── Random Button ─────────────────────────────────────── */
.btn-rnd{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);font-size:18px;padding:5px 9px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height: 44px;min-width: 44px;line-height:1;transition:transform .15s}
.btn-rnd:active{transform:scale(.88)}

/* ── Aspect Ratio ──────────────────────────────────────── */
.ar-row{display:flex;align-items:center;gap:5px}
.ar-lbl{font-size:11px;color:var(--muted);font-weight:500;flex-shrink:0}
.ar-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--muted);font-size:11px;font-weight:600;padding:5px 9px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height: 36px;white-space:nowrap;transition:all .15s}
.ar-btn.active{background:var(--a3);border-color:var(--accent);color:#fff}
.ar-btn:active{opacity:.8}

/* ── Copy & Open ───────────────────────────────────────── */





/* ── Token count ───────────────────────────────────────── */
.tok-warn{color:#ffaa00}

/* ── Toast ─────────────────────────────────────────────── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(20,20,40,.97);color:#fff;font-size:13px;font-weight:500;padding:11px 20px;border-radius:14px;opacity:0;pointer-events:none;transition:all .25s;z-index:9999;white-space:nowrap;border:1px solid var(--a2);box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.toast-err{background:rgba(180,40,40,.97)}
#toast.toast-deep{background:rgba(0,100,60,.97);border-color:rgba(0,200,120,.3)}

/* ── Random Divider ────────────────────────────────────── */
.random-divider{order:2;display:flex;align-items:center;justify-content:center;padding:6px 14px 4px;gap:10px}
.random-divider::before,.random-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-rnd-main{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--a2);border-radius:99px;color:var(--text);font-size:13px;font-weight:500;padding:8px 18px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height: 40px;white-space:nowrap;transition:all .15s}
.btn-rnd-main:active{transform:scale(.95);background:var(--a2)}

/* ── Format Row ────────────────────────────────────────── */
.format-row{display:flex;justify-content:flex-start;gap:5px;padding:4px 14px 0;order:2}
.fmt-btn{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:99px;color:var(--text);font-size:12px;font-weight:500;padding:7px 14px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height: 38px;transition:all .15s;white-space:nowrap}
.fmt-btn.active{background:var(--a2);border-color:var(--accent);color:#a8c8ff}
.fmt-btn:active{opacity:.8}

.cm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.cm-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:340px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.cm-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px}
.cm-msg{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.cm-tags{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;max-height:180px;overflow-y:auto}
.cm-tag-row{background:var(--surface2);border-radius:8px;padding:7px 10px;display:flex;flex-direction:column;gap:2px}
.cm-tag-name{font-size:12px;font-weight:500;color:var(--text)}
.cm-tag-kw{font-size:11px;color:var(--muted)}
.cm-btns{display:flex;gap:8px}
.cm-btn{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;min-height:40px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.cm-yes{background:#1a4a2e;color:#4ade80;border:1px solid #2d6b42}
.cm-yes:active{opacity:.8}
.cm-no{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.cm-no:active{opacity:.8}
.clr-box{max-width:300px}
.clr-btns{display:flex;flex-direction:column;gap:8px}
.clr-btn{width:100%;padding:11px 14px;border-radius:10px;border:0.5px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;text-align:right;min-height:44px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;background:var(--surface2);color:var(--text);transition:opacity .15s}
.clr-btn:active{opacity:.7}
[dir="ltr"] .clr-btn{text-align:left}
.clr-all{border-color:#7f1d1d;color:#f87171;background:#1c0a0a}
.clr-cancel{color:var(--muted);font-weight:400}

.btn-browse{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:18px;cursor:pointer;min-height:44px;min-width:0;display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:opacity .15s;padding:0}
.btn-browse:active{opacity:.7;transform:scale(.97)}
</style>

<body>


<!-- Install banner -->
<div class="install-banner" id="installBanner">
  <div class="install-text">
    <strong>Split Banana 🍌</strong><br>
    <span id="installMsg">הוסף למסך הבית לגישה מהירה</span>
  </div>
  <div class="install-actions">
    <button class="install-btn" id="installBtn" onclick="doInstall()"></button>
    <button class="install-dismiss" onclick="dismissInstall()">✕</button>
  </div>
</div>
<!-- iOS hint -->
<div class="ios-hint" id="iosHint">
  <span id="iosHintText">לחץ על <strong>□↑</strong> ואז "הוסף למסך הבית"</span>
  <span class="ios-hint-close" onclick="$('iosHint').classList.remove('show')">סגור</span>
</div>

<header class="header">
  <div class="header-top">
    <span class="header-title">Split Banana 🍌</span>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnHE" onclick="setLang('he')">עברית</button>
      <button class="lang-btn" id="btnEN" onclick="setLang('en')">English</button>
    </div>
  </div>
  <div class="header-bottom">
    <span class="header-subtitle" id="headerSubtitle"></span>
    <div class="search-wrap">
      <input type="search" id="search" autocomplete="off" oninput="filterTags()" />
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </div>
  </div>
</header>

<div class="app">
  <!-- Prompt area -->
  <div class="right-col">
    <textarea id="userInput" rows="4"></textarea>
    <div class="chips-wrap" id="selectedBar"></div>
    <div class="result-box">
      <div class="result-top">
        <div class="result-label-wrap">
          <div class="result-dot"></div>
          <button class="hist-btn" onclick="toggleHistPanel()" title="היסטוריה">🕐</button>
          <div class="hist-panel" id="histPanel">
            <div class="hist-header">
              <span id="histTitle">היסטוריה</span>
              <button class="hist-clear" onclick="clearHistory()" id="histClear">נקה</button>
            </div>
            <div id="historyList"></div>
          </div>
            <span id="resultLabel"></span>
        </div>
        <span id="charCount"></span>
      </div>
      <div id="finalPrompt"></div>
    </div>


          <div class="action-row">
      <button class="btn-copy" id="copyBtn" onclick="copyPrompt()">
        <span id="copyIcon">📋</span>
        <span id="copyText"></span>
      </button>
      <button class="btn-browse" id="browseBtn" onclick="openBrowser()">🌐</button>
      <button class="btn-clear" id="clearBtn" onclick="clearAll()"></button>
    </div>
  </div>
  <!-- Format row — above random button -->
  <div class="format-row">
    <button class="fmt-btn" data-ar="--ar 9:16" onclick="setAR('--ar 9:16')">📱 <span id="fmtStory">סטורי</span></button>
    <button class="fmt-btn" data-ar="--ar 1:1" onclick="setAR('--ar 1:1')">⬜ <span id="fmtSquare">ריבוע</span></button>
    <button class="fmt-btn" data-ar="--ar 16:9" onclick="setAR('--ar 16:9')">🖼️ <span id="fmtWide">רחב</span></button>
  </div>
  <!-- Random button — between categories and input -->
  <div class="random-divider">
    <button class="btn-rnd-main" id="randomBtn" onclick="randomize()">
      🎲 <span id="randomBtnLabel">הפתע/י אותי</span>
    </button>
  </div>

  <!-- Categories -->
  <div class="left-col">
    <!-- Onboarding hint -->
    <div class="onboarding" id="onboarding">
      <div class="ob-steps">
        <div class="ob-step"><div class="ob-num">1</div><span id="ob1">בחר/י קטגוריה</span></div>
        <div class="ob-step"><div class="ob-num">2</div><span id="ob2">בחר/י תגיות</span></div>
        <div class="ob-step"><div class="ob-num">3</div><span id="ob3">תאר/י וצור/י</span></div>
      </div>
      <button class="ob-close" onclick="dismissOnboarding()">✕</button>
    </div>
    <div class="cat-grid" id="catGrid"></div>
    <div class="tag-panel" id="tagPanel">
      <div class="tag-panel-header">
        <span class="tag-panel-title" id="tagPanelTitle"></span>
        <button class="tag-panel-close" onclick="closePanel()">×</button>
      </div>
      <div class="tag-list" id="tagList"></div>
    </div>
  </div>
</div>

// ─── Build category grid ──────────────────────────────────────
function buildCatGrid() {
  const grid = $('catGrid');
  if (!grid) { setTimeout(buildCatGrid, 50); return; }
  grid.innerHTML = '';
  DATA.forEach(function(cat, ci) {
    const catData = cat[currentLang];
    const pill = document.createElement('button');
    pill.className = 'cat-pill';
    pill.dataset.ci = String(ci);

    const badge = document.createElement('span');
    badge.className = 'cat-badge';
    badge.id = 'badge-' + ci;

    const titleStr = catData.title;
    const emojiMatch = titleStr.match(/^(\S+)/);
    const emoji = emojiMatch ? emojiMatch[1] : '📌';
    let txt = titleStr.replace(/^\S+\s*/, '').trim();
    if (txt.length > 14) txt = txt.slice(0, 13) + '…';

    const emojiEl = document.createElement('span');
    emojiEl.className = 'cat-emoji';
    emojiEl.textContent = emoji;

    const nameEl = document.createElement('span');
    nameEl.className = 'cat-name';
    nameEl.textContent = txt;

    pill.appendChild(badge);
    pill.appendChild(emojiEl);
    pill.appendChild(nameEl);
    pill.onclick = (function(idx) { return function() { openPanel(idx); }; })(ci);
    grid.appendChild(pill);
  });
  updateBadges();
}

// ─── Open tag panel ───────────────────────────────────────────
function openPanel(ci) {
  if (activeCatIdx === ci) { closePanel(); return; }
  activeCatIdx = ci;
  const cat = DATA[ci];
  const catData = cat[currentLang];

  document.querySelectorAll('.cat-pill').forEach(function(p, i) {
    p.classList.toggle('active', i === ci);
  });

  $('tagPanelTitle').textContent = catData.title;

  const list = $('tagList');
  list.innerHTML = '';
  cat.tags.forEach(function(t) {
    const tagData = t[currentLang];
    const btn = document.createElement('button');
    btn.className = 'tag-btn' + (selected.has(t.val) ? ' active' : '');
    btn.dataset.val = t.val;

    const text = document.createTextNode(tagData.label);
    const sub = document.createElement('span');
    sub.className = 'tag-btn-sub';
    sub.textContent = tagData.sub;

    btn.appendChild(text);
    btn.appendChild(sub);
    btn.onclick = (function(b, v) { return function() { toggleTag(b, v); }; })(btn, t.val);
    list.appendChild(btn);
  });

  const panel = $('tagPanel');
  panel.classList.add('open');

  if (window.innerWidth < 768) {
    setTimeout(function() {
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 60);
  }
}

function closePanel() {
  $('tagPanel').classList.remove('open');
  document.querySelectorAll('.cat-pill').forEach(function(p) { p.classList.remove('active'); });
  activeCatIdx = -1;
}

// ─── Toggle tag ───────────────────────────────────────────────
function toggleTag(btn, val) {
  if (selected.has(val)) {
    selected.delete(val);
    btn.classList.remove('active');
  } else {
    selected.add(val);
    btn.classList.add('active');
  }
  updateBadges();
  updateChips();
  generate();
}

function updateBadges() {
  DATA.forEach(function(cat, ci) {
    let count = 0;
    cat.tags.forEach(function(t) { if (selected.has(t.val)) count++; });
    let b = $('badge-' + ci);
    if (b) { b.textContent = count; b.classList.toggle('on', count > 0); }
  });
}

// ─── Chips ────────────────────────────────────────────────────
function updateChips() {
  const bar = $('selectedBar');
  bar.innerHTML = '';
  selected.forEach(function(val) {
    const chip = document.createElement('div');
    chip.className = 'sel-chip';
    const x = document.createElement('span');
    x.className = 'sel-chip-x';
    x.textContent = '✕';
    chip.appendChild(x);
    chip.appendChild(document.createTextNode(findLabel(val)));
    chip.onclick = (function(v) { return function() {
      selected.delete(v);
      document.querySelectorAll('.tag-btn').forEach(function(b) {
        if (b.dataset.val === v) b.classList.remove('active');
      });
      updateBadges(); updateChips(); generate();
    }; })(val);
    bar.appendChild(chip);
  });
}

function findLabel(val) {
  for (let i = 0; i < DATA.length; i++)
    for (let j = 0; j < DATA[i].tags.length; j++)
      if (DATA[i].tags[j].val === val) return DATA[i].tags[j][currentLang].label;
  return val.split(',')[0];
}

function detectConflicts(userText) {
  const txt = userText.toLowerCase();
  const conflicts = [];
  for (const rule of CONFLICT_MAP) {
    const allKw = [...rule.kw_he, ...rule.kw_en];
    const matchedKw = allKw.find(k => txt.includes(k.toLowerCase()));
    if (!matchedKw) continue;
    for (const val of Array.from(selected)) {
      const valLow = val.toLowerCase();
      const matchedTag = rule.tags.find(tg => valLow.includes(tg.toLowerCase()));
      if (matchedTag && !conflicts.find(cf => cf.val === val)) {
        conflicts.push({ keyword: matchedKw, val, label: findLabel(val) });
      }
    }
  }
  return conflicts;
}

  modal.addEventListener('click', function(e) { if (e.target === modal) { modal.remove(); onNo(); } });

function _doGenerate() {
  const t = T[currentLang];
  let txt = $('userInput').value.trim();
  const el = $('finalPrompt');
  const parts = [];
  if (txt) parts.push(txt);
  const sortedVals = Array.from(selected).sort(function(a,b) { return getValPriority(a) - getValPriority(b); });
  sortedVals.forEach(function(v) { parts.push(v); });
  const arSuffix = currentAR ? ' ' + currentAR : '';
  const prompt = parts.join(', ') + arSuffix + ' ' + NEG;
  lastPrompt = prompt;
  el.className = 'prompt-ready';
  el.textContent = prompt;
  const tokens = prompt.replace(/ --no .+$/,'').split(/[,\s]+/).filter(Boolean).length;
  const tokWarn = tokens > 70 ? ' \u26a0\ufe0f' : '';
  $('charCount').textContent = t.charCount(prompt.length) + ' \xb7 ~' + tokens + ' tokens' + tokWarn;
  saveHistory(prompt);
}

function generate() {
  const t = T[currentLang];
  let txt = $('userInput').value.trim();
  const el = $('finalPrompt');
  if (!txt && selected.size === 0) {
    lastPrompt = '';
    el.className = 'prompt-empty';
    el.textContent = t.emptyPrompt;
    $('charCount').textContent = t.charCount(0);
    return;
  }
  if (txt && selected.size > 0) {
    const conflicts = detectConflicts(txt);
    if (conflicts.length > 0) {
      showConflictModal(
        conflicts,
        function() {
          conflicts.forEach(function(cf) { selected.delete(cf.val); });
          updateBadges();
          updateChips();
          if (activeCatIdx >= 0) openPanel(activeCatIdx);
          _doGenerate();
        },
        function() { _doGenerate(); }
      );
      return;
    }
  }
  _doGenerate();
}

function filterTags() {
  let q = $('search').value.toLowerCase().trim();
  if (!q) {
    document.querySelectorAll('.tag-btn').forEach(b => b.style.display = '');
    return;
  }

  // Find first category with matching tags, open it
  let foundCi = -1;
  DATA.forEach(function(cat, ci) {
    if (foundCi >= 0) return;
    cat.tags.forEach(function(t) {
      const text = (t[currentLang].label + ' ' + t[currentLang].sub + ' ' + t.val).toLowerCase();
      if (text.includes(q)) { if (foundCi < 0) foundCi = ci; }
    });
  });

  if (foundCi >= 0) {
    openPanel(foundCi);
    // Filter visible tags in panel
    document.querySelectorAll('.tag-btn').forEach(function(btn) {
      const text = btn.textContent.toLowerCase();
      let val = (btn.dataset.val || '').toLowerCase();
      btn.style.display = (!q || text.includes(q) || val.includes(q)) ? '' : 'none';
    });
  }

  if (!q) {
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('tag-hidden'));
  }
}

function copyPrompt() {
  const t = T[currentLang];
  if (!lastPrompt) return;
  const btn = $('copyBtn');
  const icon = $('copyIcon');
  const label = $('copyText');

  function onOk() {
    btn.classList.add('copied');
    icon.textContent = '✅';
    label.textContent = t.copiedBtn;
    setTimeout(function() {
      btn.classList.remove('copied');
      icon.textContent = '📋';
      label.textContent = t.copyBtn;
    }, 2200);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(lastPrompt).then(onOk).catch(fallback);
  } else { fallback(); }

  function fallback() {
    const ta = document.createElement('textarea');
    ta.value = lastPrompt;
    ta.style.cssText = 'position:fixed;top:-9999px;opacity:0;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); onOk(); } catch(e) { showToast(currentLang==='he'?'העתקה נכשלה':'Copy failed', true); }
    document.body.removeChild(ta);
  }
}

const ORDER_PRIORITY = {
  '😊': 1, 'Expressions': 1,
  '🧍': 2, 'Body Poses': 2,
  '🎭': 3, 'Characters': 3,
  '🌍': 4, 'Geographic': 4,

  '🎬': 6, 'Genres': 6,
  '🎨': 7, 'Art Styles': 7,
  '📸': 8, 'Photography': 8,
  '💡': 9, 'Lighting': 9,
  '📐': 10, 'Composition': 10,
  '🌆': 11, 'Environments': 11,
  '🖌': 12, 'Color Palette': 12,
  '⚙': 13, 'Quality': 13,
  '🔮': 14, 'Aesthetics': 14,
  '👗': 15, 'Fashion': 15,
};

function getValPriority(val) {
  for (let ci = 0; ci < DATA.length; ci++) {
    for (let ti = 0; ti < DATA[ci].tags.length; ti++) {
      if (DATA[ci].tags[ti].val === val) {
        const title = DATA[ci][currentLang].title;
        for (const key in ORDER_PRIORITY) {
          if (title.includes(key)) return ORDER_PRIORITY[key];
        }
      }
    }
  }
  return 99;
}

// ── Prompt History ────────────────────────────────────────
const MAX_HIST = 8;

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function saveHistory(prompt) {
  try {
    const h = JSON.parse(localStorage.getItem('sbp_hist') || '[]');
    if (h[0] && h[0].p === prompt) return;
    const entry = {
      p: prompt,
      text: $('userInput').value.trim(),
      tags: Array.from(selected),
      ar: currentAR,
      ts: Date.now()
    };
    h.unshift(entry);
    if (h.length > MAX_HIST) h.pop();
    localStorage.setItem('sbp_hist', JSON.stringify(h));
  } catch(e) { console.warn('[SBP]', e); }
}
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('sbp_hist') || '[]'); } catch(e) { return []; }
}
function renderHistory() {
  const el = $('historyList');
  if (!el) return;
  const h = loadHistory();
  const t = T[currentLang];
  if (!h.length) {
    el.innerHTML = '<div class="hist-empty">' + (currentLang==='he' ? 'אין פרומפטים שמורים עדיין' : 'No saved prompts yet') + '</div>';
    return;
  }
  el.innerHTML = h.map((e,i) => {
    const short = escHtml(e.p.length > 70 ? e.p.slice(0,70)+'…' : e.p);
    const time = new Date(e.ts).toLocaleTimeString(currentLang==='he'?'he-IL':'en-US',{hour:'2-digit',minute:'2-digit'});
    return '<div class="hist-item" onclick="loadHist('+i+')">' +
      '<div class="hist-text">' + escHtml(short) + '</div>' +
      '<div class="hist-time">' + time + '</div></div>';
  }).join('');
}
function loadHist(idx) {
  const h = loadHistory();
  if (!h[idx]) return;
  const entry = h[idx];
  // שחזר טקסט חופשי
  $('userInput').value = entry.text || '';
  // שחזר תגיות
  selected.clear();
  if (entry.tags && Array.isArray(entry.tags)) {
    entry.tags.forEach(v => selected.add(v));
  }
  // שחזר AR
  currentAR = entry.ar || '';
  document.querySelectorAll('.fmt-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.ar === currentAR)
  );
  // עדכן UI
  updateBadges();
  updateChips();
  if (activeCatIdx >= 0) openPanel(activeCatIdx);
  toggleHistPanel();
  generate();
}
function toggleHistPanel() {
  const p = $('histPanel');
  if (!p) return;
  const opening = !p.classList.contains('open');
  p.classList.toggle('open');
  if (opening) renderHistory();
}
function clearHistory() {
  try { localStorage.removeItem('sbp_hist'); } catch(e) { console.warn('[SBP]', e); }
  renderHistory();
}

function randomize() {
  selected.clear();
  const shuffled = [...DATA].sort(() => Math.random() - 0.5).slice(0, 5);
  shuffled.forEach(cat => {
    const tag = cat.tags[Math.floor(Math.random() * cat.tags.length)];
    selected.add(tag.val);
  });
  if (activeCatIdx >= 0) openPanel(activeCatIdx);
  updateBadges();
  updateChips();
  generate();
  const btn = $('randomBtn');
  const lbl = $('randomBtnLabel');
  const t = T[currentLang];
  if (btn) {
    btn.innerHTML = '✨';
    setTimeout(() => {
      btn.innerHTML = '🎲 <span id="randomBtnLabel">' + (t.randomBtn || 'הפתע/י אותי') + '</span>';
    }, 700);
  }
}

// ── Onboarding ────────────────────────────────────────────
function initOnboarding() {
  try { if (localStorage.getItem('sbp_ob')) return; } catch(e) { console.warn('[SBP]', e); }
  const el = $('onboarding');
  if (el) setTimeout(() => el.classList.add('show'), 400);
}
function dismissOnboarding() {
  const el = $('onboarding');
  if (el) el.classList.remove('show');
  try { localStorage.setItem('sbp_ob', '1'); } catch(e) { console.warn('[SBP]', e); }
}

// ── Aspect Ratio ──────────────────────────────────────────
let currentAR = '';
function setAR(ar) {
  currentAR = currentAR === ar ? '' : ar;
  document.querySelectorAll('.fmt-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.ar === currentAR)
  );
  if (lastPrompt) generate();
}

// ── Copy & Open ───────────────────────────────────────────

function showToast(msg, isErr, isDeep) {
  let t = $('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' toast-err' : '') + (isDeep ? ' toast-deep' : '');
  clearTimeout(t._timer);
  // deep link messages stay longer
  t._timer = setTimeout(() => t.classList.remove('show'), isDeep ? 3500 : 2200);
}

function startApp() {
  initInstall();
  initOnboarding();
  try { buildCatGrid(); } catch(e) { console.error('[SBP] buildCatGrid:', e); setTimeout(buildCatGrid, 100); }
  try { generate(); } catch(e) { console.warn('[SBP]', e); }
  // Set initial UI text
  const t = T[currentLang];
  setPlaceholder('userInput', t.placeholder);
  setPlaceholder('search', t.searchPlaceholder);
  setText('charCount', t.charCount(0));
  setText('headerSubtitle', t.subtitle);
  setText('resultLabel', t.resultLabel);
  setText('copyText', t.copyBtn);
  setText('clearBtn', t.clearBtn);
  setText('arLabel', t.arLabel);
  setText('histTitle', t.histTitle);
  setText('histClear', t.histClear);
  setText('ob1', t.ob1);
  setText('ob2', t.ob2);
  setText('ob3', t.ob3);
  if (t.fmtStory) setText('fmtStory', t.fmtStory);
  if (t.fmtSquare) setText('fmtSquare', t.fmtSquare);
  if (t.fmtWide) setText('fmtWide', t.fmtWide);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startApp);
} else {
  startApp();
}</script>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#08080f">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/json,{
  %22name%22:%22Split Banana Pro%22,
  %22short_name%22:%22Split Banana%22,
  %22start_url%22:%22.%22,
  %22display%22:%22standalone%22,
  %22background_color%22:%22%2308080f%22,
  %22theme_color%22:%22%2308080f%22,
  %22icons%22:[{%22src%22:%22https://via.placeholder.com/192x192/29b6f6/ffffff?text=%F0%9F%8D%8C%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]
}">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>Split Banana Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080f;
  --surface: #0f0f1a;
  --surface2: #16162a;
  --border: rgba(255,255,255,0.07);
  --accent: #007aff;
  --teal: #00e5cc;
  --a1: rgba(0,122,255,0.05);
  --a2: rgba(0,122,255,0.15);
  --a3: rgba(0,122,255,0.28);
  --a4: rgba(0,122,255,0.45);
  --text: #e8e8f0;
  --muted: #6b6b88;
  --r: 12px;
  --r-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rubik', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  position: -webkit-sticky;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,8,15,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.header-title {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  flex-shrink: 0;
}
.header-subtitle {
  font-size: 11px;
  color: var(--muted);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.search-wrap {
  position: relative;
  flex: 1;
  max-width: 200px;
  min-width: 100px;
}
.search-icon {
  position: absolute;
  right: 9px;
  top: 50%;
  transform: translateY(-50%);
  width: 13px;
  height: 13px;
  color: var(--muted);
  pointer-events: none;
}
#search {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text);
  font-family: 'Rubik', sans-serif;
  font-size: 13px;
  padding: 6px 28px 6px 10px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
#search::placeholder { color: var(--muted); }
#search:focus { border-color: var(--a4); }
.lang-toggle {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
}
.lang-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'Rubik', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.lang-btn.active { background: var(--accent); color: #fff; }

/* ── App layout ── */
.app {
  display: grid;
  grid-template-columns: 1fr;
}
@media (min-width: 768px) {
  .app { grid-template-columns: minmax(0,1fr) minmax(0,1fr); align-items: start; }
}
@media (min-width: 1200px) {
  .app { grid-template-columns: minmax(0,1.3fr) minmax(0,1fr); }
}

/* ── Right col (prompt) — first on mobile, second on desktop ── */
.right-col {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  order: 2;
}
@media (min-width: 768px) {
  .right-col {
    order: 1;
    border-left: 1px solid var(--border);
    position: -webkit-sticky;
  position: sticky;
    top: 55px;
    max-height: calc(100vh - 55px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
}

/* ── Left col (categories) ── */
.left-col {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  order: 1;
}
@media (min-width: 768px) {
  .left-col {
    order: 2;
    position: -webkit-sticky;
  position: sticky;
    top: 55px;
    max-height: calc(100vh - 55px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
}

/* ── Category grid pills ── */
.cat-section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 2px;
}
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  gap: 6px;
}
@media (min-width: 480px) {
  .cat-grid { grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); }
}
.cat-pill {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 8px 4px 7px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  position: relative;
  text-align: center;
}
.cat-pill:active { opacity: 0.8; }
.cat-pill.active {
  background: var(--a2);
  border-color: var(--a4);
}
.cat-emoji { font-size: 20px; line-height: 1; }
.cat-name {
  font-size: 9px;
  font-weight: 500;
  color: var(--muted);
  line-height: 1.2;
  word-break: break-word;
  hyphens: auto;
}
.cat-pill.active .cat-name { color: #a8c8ff; }
.cat-badge {
  position: absolute;
  top: 5px;
  left: 5px;
  background: var(--accent);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  border-radius: 99px;
  padding: 1px 5px;
  display: none;
  min-width: 16px;
  text-align: center;
}
.cat-badge.on { display: block; }

/* ── Tag panel ── */
.tag-panel {
  background: var(--surface);
  border: 1px solid var(--a2);
  border-radius: var(--r);
  overflow: hidden;
  display: none;
  animation: panelIn 0.15s ease;
}
@keyframes panelIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.tag-panel.open { display: block; }

.tag-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--a1);
}
.tag-panel-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.tag-panel-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  touch-action: manipulation;
}

.tag-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 7px;
  padding: 12px;
}
.tag-btn {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 11px;
  border-radius: var(--r-sm);
  cursor: pointer;
  font-family: 'Rubik', sans-serif;
  font-size: 12px;
  font-weight: 500;
  text-align: right;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-height: 44px;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  line-height: 1.3;
}
.tag-btn:active { opacity: 0.8; }
.tag-btn-sub { font-size: 10px; color: var(--muted); font-weight: 400; }
.tag-btn.active {
  background: var(--a3);
  border-color: #007aff;
  border-width: 1.5px;
  color: #fff;
  box-shadow: 0 0 8px var(--a2);
}
.tag-btn.active .tag-btn-sub { color: rgba(255,255,255,0.5); }
[dir="ltr"] .tag-btn { text-align: left; }

/* ── Prompt area ── */
#userInput {
  width: 100%;
  min-height: 100px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  padding: 12px 14px;
  font-family: 'Rubik', sans-serif;
  font-size: 16px !important;
  line-height: 1.6;
  outline: none;
  resize: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
#userInput::placeholder { color: var(--muted); }
#userInput:focus { border-color: var(--a4); }

/* ── Chips ── */
.chips-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  min-height: 4px;
}
.sel-chip {
  background: var(--a2);
  border: 1px solid var(--a3);
  color: #a8c8ff;
  font-size: 11px;
  font-weight: 500;
  padding: 3px 8px 3px 5px;
  border-radius: 99px;
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  animation: chipIn 0.12s ease;
  touch-action: manipulation;
}
@keyframes chipIn {
  from { opacity: 0; transform: scale(0.85); }
  to   { opacity: 1; transform: scale(1); }
}
.sel-chip-x { opacity: 0.45; font-size: 13px; }

/* ── Result ── */
.result-box {
  background: var(--surface);
  border: 1px solid var(--a2);
  border-radius: var(--r);
  overflow: hidden;
}
.result-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 13px;
  border-bottom: 1px solid var(--border);
  background: var(--a1);
}
.result-label-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.7px;
}
.result-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--teal);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
#charCount { font-size: 11px; color: var(--muted); }
#finalPrompt {
  padding: 12px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
  color: var(--teal);
  min-height: 70px;
  white-space: pre-wrap;
  word-break: break-word;
}

/* ── Actions ── */
.action-row { display: flex; gap: 7px; }
.btn-copy {
  flex: 1;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--r-sm);
  padding: 11px 14px;
  font-family: 'Rubik', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: opacity 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
}
.btn-copy:active { opacity: 0.85; }
.btn-copy.copied { background: #1a8a3a; }
.btn-clear {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: var(--r-sm);
  padding: 11px 13px;
  font-family: 'Rubik', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
  white-space: nowrap;
}
.btn-clear:active { background: rgba(255,255,255,0.05); }



#finalPrompt.prompt-empty {
  color: var(--muted);
  font-family: 'Rubik', sans-serif;
  font-size: 13px;
}
#finalPrompt.prompt-ready {
  color: var(--teal);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
/* ── Install banner ── */
.install-banner {
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 14px;
  background: linear-gradient(135deg, rgba(0,122,255,0.15), rgba(0,229,204,0.08));
  border-bottom: 1px solid var(--border);
  animation: slideDown 0.3s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.install-banner.show { display: flex; }
.install-text {
  font-size: 12px;
  color: var(--text);
  line-height: 1.4;
  flex: 1;
}
.install-text strong { color: #fff; font-weight: 600; }
.install-actions { display: flex; gap: 6px; flex-shrink: 0; }
.install-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-family: 'Rubik', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  touch-action: manipulation;
  white-space: nowrap;
}
.install-dismiss {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 8px;
  padding: 6px 10px;
  font-family: 'Rubik', sans-serif;
  font-size: 12px;
  cursor: pointer;
  touch-action: manipulation;
}
/* iOS hint */
.ios-hint {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 12px;
  color: var(--text);
  text-align: center;
  line-height: 1.5;
  z-index: 999;
  max-width: 280px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.ios-hint.show { display: block; }
.ios-hint-close {
  display: block;
  margin-top: 8px;
  color: var(--accent);
  cursor: pointer;
  font-weight: 600;
}


.tag-hidden { display: none !important; }

@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .app { padding-bottom: env(safe-area-inset-bottom); }
}
</style>
</head>
<body>


<!-- Install banner -->
<div class="install-banner" id="installBanner">
  <div class="install-text">
    <strong>🍌 Split Banana Pro</strong><br>
    <span id="installMsg">הוסף למסך הבית לגישה מהירה</span>
  </div>
  <div class="install-actions">
    <button class="install-btn" id="installBtn" onclick="doInstall()"></button>
    <button class="install-dismiss" onclick="dismissInstall()">✕</button>
  </div>
</div>
<!-- iOS hint -->
<div class="ios-hint" id="iosHint">
  <span id="iosHintText">לחץ על <strong>□↑</strong> ואז "הוסף למסך הבית"</span>
  <span class="ios-hint-close" onclick="$('iosHint').classList.remove('show')">סגור</span>
</div>

<header class="header">

  <span class="header-title">Split Banana Pro</span>
  <span class="header-subtitle" id="headerSubtitle"></span>
  <div class="search-wrap">
    <input type="search" id="search" autocomplete="off" oninput="filterTags()" />
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btnHE" onclick="setLang('he')">HE</button>
    <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
  </div>
</header>

<div class="app">
  <!-- Prompt area -->
  <div class="right-col">
    <textarea id="userInput" rows="4"></textarea>
    <div class="chips-wrap" id="selectedBar"></div>
    <div class="result-box">
      <div class="result-top">
        <div class="result-label-wrap">
          <div class="result-dot"></div>
          <span id="resultLabel"></span>
        </div>
        <span id="charCount"></span>
      </div>
      <div id="finalPrompt"></div>
    </div>
    <div class="action-row">
      <button class="btn-copy" id="copyBtn" onclick="copyPrompt()">
        <span id="copyIcon">📋</span>
        <span id="copyText"></span>
      </button>
      <button class="btn-clear" id="clearBtn" onclick="clearAll()"></button>
    </div>
  </div>

  <!-- Categories -->
  <div class="left-col">
    <div class="cat-grid" id="catGrid"></div>
    <div class="tag-panel" id="tagPanel">
      <div class="tag-panel-header">
        <span class="tag-panel-title" id="tagPanelTitle"></span>
        <button class="tag-panel-close" onclick="closePanel()">×</button>
      </div>
      <div class="tag-list" id="tagList"></div>
    </div>
  </div>
</div>

    emptyPrompt: '✨ Your prompt will appear here — copy it to your favorite AI image generator (Midjourney, Stable Diffusion, DALL·E and more) and create the image we built together!',
    charCount: function(n) { return n + ' chars'; },
    clearBtn: 'Clear', copyBtn: 'Copy Prompt', copiedBtn: '✅ Copied!',
    resultLabel: 'Prompt ready', subtitle: 'AI Image Prompt Builder',
    categories: 'Categories',
  }
};

// ─── Build category grid ──────────────────────────────────────
function buildCatGrid() {
  const grid = $('catGrid');
  if (!grid) { setTimeout(buildCatGrid, 50); return; }
  grid.innerHTML = '';
  DATA.forEach(function(cat, ci) {
    const catData = cat[currentLang];
    const pill = document.createElement('button');
    pill.className = 'cat-pill';
    pill.dataset.ci = String(ci);

    const badge = document.createElement('span');
    badge.className = 'cat-badge';
    badge.id = 'badge-' + ci;

    const titleStr = catData.title;
    const emojiMatch = titleStr.match(/^(\S+)/);
    const emoji = emojiMatch ? emojiMatch[1] : '📌';
    let txt = titleStr.replace(/^\S+\s*/, '').trim();
    if (txt.length > 14) txt = txt.slice(0, 13) + '…';

    const emojiEl = document.createElement('span');
    emojiEl.className = 'cat-emoji';
    emojiEl.textContent = emoji;

    const nameEl = document.createElement('span');
    nameEl.className = 'cat-name';
    nameEl.textContent = txt;

    pill.appendChild(badge);
    pill.appendChild(emojiEl);
    pill.appendChild(nameEl);
    pill.onclick = (function(idx) { return function() { openPanel(idx); }; })(ci);
    grid.appendChild(pill);
  });
  updateBadges();
}

// ─── Open tag panel ───────────────────────────────────────────
function openPanel(ci) {
  if (activeCatIdx === ci) { closePanel(); return; }
  activeCatIdx = ci;
  const cat = DATA[ci];
  const catData = cat[currentLang];

  document.querySelectorAll('.cat-pill').forEach(function(p, i) {
    p.classList.toggle('active', i === ci);
  });

  $('tagPanelTitle').textContent = catData.title;

  const list = $('tagList');
  list.innerHTML = '';
  cat.tags.forEach(function(t) {
    const tagData = t[currentLang];
    const btn = document.createElement('button');
    btn.className = 'tag-btn' + (selected.has(t.val) ? ' active' : '');
    btn.dataset.val = t.val;

    const text = document.createTextNode(tagData.label);
    const sub = document.createElement('span');
    sub.className = 'tag-btn-sub';
    sub.textContent = tagData.sub;

    btn.appendChild(text);
    btn.appendChild(sub);
    btn.onclick = (function(b, v) { return function() { toggleTag(b, v); }; })(btn, t.val);
    list.appendChild(btn);
  });

  const panel = $('tagPanel');
  panel.classList.add('open');

  if (window.innerWidth < 768) {
    setTimeout(function() {
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 60);
  }
}

function closePanel() {
  $('tagPanel').classList.remove('open');
  document.querySelectorAll('.cat-pill').forEach(function(p) { p.classList.remove('active'); });
  activeCatIdx = -1;
}

// ─── Toggle tag ───────────────────────────────────────────────
function toggleTag(btn, val) {
  if (selected.has(val)) {
    selected.delete(val);
    btn.classList.remove('active');
  } else {
    selected.add(val);
    btn.classList.add('active');
  }
  updateBadges();
  updateChips();
  generate();
}

function updateBadges() {
  DATA.forEach(function(cat, ci) {
    let count = 0;
    cat.tags.forEach(function(t) { if (selected.has(t.val)) count++; });
    let b = $('badge-' + ci);
    if (b) { b.textContent = count; b.classList.toggle('on', count > 0); }
  });
}

// ─── Chips ────────────────────────────────────────────────────
function updateChips() {
  const bar = $('selectedBar');
  bar.innerHTML = '';
  selected.forEach(function(val) {
    const chip = document.createElement('div');
    chip.className = 'sel-chip';
    const x = document.createElement('span');
    x.className = 'sel-chip-x';
    x.textContent = '✕';
    chip.appendChild(x);
    chip.appendChild(document.createTextNode(findLabel(val)));
    chip.onclick = (function(v) { return function() {
      selected.delete(v);
      document.querySelectorAll('.tag-btn').forEach(function(b) {
        if (b.dataset.val === v) b.classList.remove('active');
      });
      updateBadges(); updateChips(); generate();
    }; })(val);
    bar.appendChild(chip);
  });
}

function findLabel(val) {
  for (let i = 0; i < DATA.length; i++)
    for (let j = 0; j < DATA[i].tags.length; j++)
      if (DATA[i].tags[j].val === val) return DATA[i].tags[j][currentLang].label;
  return val.split(',')[0];
}

// ─── Generate ─────────────────────────────────────────────────
function generate() {
  const t = T[currentLang];
  let txt = $('userInput').value.trim();
  const el = $('finalPrompt');
  if (!txt && selected.size === 0) {
    lastPrompt = '';
    el.className = 'prompt-empty';
    el.textContent = t.emptyPrompt;
    $('charCount').textContent = t.charCount(0);
    return;
  }
  const parts = [];
  if (txt) parts.push(txt);
  Array.from(selected).forEach(function(v) { parts.push(v); });
  const prompt = parts.join(', ') + ' ' + NEG;
  lastPrompt = prompt;
  el.className = 'prompt-ready';
  el.textContent = prompt;
  $('charCount').textContent = t.charCount(prompt.length);
}

// ─── Search ───────────────────────────────────────────────────
function filterTags() {
  let q = $('search').value.toLowerCase().trim();
  if (!q) { return; }

  // Find first category with matching tags, open it
  let foundCi = -1;
  DATA.forEach(function(cat, ci) {
    if (foundCi >= 0) return;
    cat.tags.forEach(function(t) {
      const text = (t[currentLang].label + ' ' + t[currentLang].sub + ' ' + t.val).toLowerCase();
      if (text.includes(q)) { if (foundCi < 0) foundCi = ci; }
    });
  });

  if (foundCi >= 0) {
    openPanel(foundCi);
    // Filter visible tags in panel
    document.querySelectorAll('.tag-btn').forEach(function(btn) {
      const text = btn.textContent.toLowerCase();
      let val = (btn.dataset.val || '').toLowerCase();
      btn.style.display = (!q || text.includes(q) || val.includes(q)) ? '' : 'none';
    });
  }

  if (!q) {
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('tag-hidden'));
  }
}

// ─── Copy ─────────────────────────────────────────────────────
function copyPrompt() {
  const t = T[currentLang];
  if (!lastPrompt) return;
  const btn = $('copyBtn');
  const icon = $('copyIcon');
  const label = $('copyText');

  function onOk() {
    btn.classList.add('copied');
    icon.textContent = '✅';
    label.textContent = t.copiedBtn;
    setTimeout(function() {
      btn.classList.remove('copied');
      icon.textContent = '📋';
      label.textContent = t.copyBtn;
    }, 2200);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(lastPrompt).then(onOk).catch(fallback);
  } else { fallback(); }

  function fallback() {
    const ta = document.createElement('textarea');
    ta.value = lastPrompt;
    ta.style.cssText = 'position:fixed;top:-9999px;opacity:0;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); onOk(); } catch(e) { alert(lastPrompt); }
    document.body.removeChild(ta);
  }
}

// ─── Clear ────────────────────────────────────────────────────
function clearAll() {
  $('userInput').value = '';
  selected.clear();
  document.querySelectorAll('.tag-btn').forEach(function(b) { b.classList.remove('active'); });
  $('search').value = '';
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('tag-hidden'));
  updateBadges(); updateChips(); generate();
}

// ─── setLang ──────────────────────────────────────────────────


function setLang(lang) {
  currentLang = lang;
  const t = T[lang];
  document.documentElement.lang = t.lang;
  document.documentElement.dir = t.dir;
  $('btnHE').classList.toggle('active', lang === 'he');
  $('btnEN').classList.toggle('active', lang === 'en');
  setPlaceholder('userInput', t.placeholder);
  setPlaceholder('search', t.searchPlaceholder);
  setText('headerSubtitle', t.subtitle);
  setText('resultLabel', t.resultLabel);
  setText('copyText', t.copyBtn);
  setText('clearBtn', t.clearBtn);
  // Rebuild categories in new language, keep panel open if was open
  let prevActive = activeCatIdx;
  buildCatGrid();
  if (prevActive >= 0) openPanel(prevActive);
  updateChips();
  generate();
  // עדכן install banner text
  if (typeof T_install !== 'undefined' && T_install[lang]) {
    const ti = T_install[lang];
    setText('installMsg', ti.msg);
    const ib = $('installBtn');
    if (ib) ib.textContent = ti.btn;
  }
}

// ─── Start ────────────────────────────────────────────────────

// ── PWA Install ───────────────────────────────────────────────
let deferredPrompt = null;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandalone = window.matchMedia('(display-mode: standalone)').matches
  || navigator.standalone;

function initInstall() {
  if (isInStandalone) return; // כבר מותקן

  const T_install = {
    he: { msg: 'הוסף למסך הבית לגישה מהירה', btn: 'הוסף', ios: 'לחץ על ⬆ ואז "הוסף למסך הבית"' },
    en: { msg: 'Add to home screen for quick access', btn: 'Add', ios: 'Tap ⬆ then "Add to Home Screen"' },
  };

  function showBanner() {
    const t = T_install[currentLang] || T_install.he;
    setText('installMsg', t.msg);
    const btn = $('installBtn');
    if (btn) btn.textContent = t.btn;
    $('installBanner').classList.add('show');
  }

  if (isIOS) {
    // iOS: הצג אחרי 3 שניות
    setTimeout(() => {
      const t = T_install[currentLang] || T_install.he;
      setText('iosHintText', t.ios);
      $('iosHint').classList.add('show');
      setTimeout(() => $('iosHint').classList.remove('show'), 8000);
    }, 3000);
    return;
  }

  // Android/Desktop: beforeinstallprompt
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    showBanner();
  });
}

function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(choice => {
    deferredPrompt = null;
    $('installBanner').classList.remove('show');
  });
}

function dismissInstall() {
  $('installBanner').classList.remove('show');
  deferredPrompt = null;
}


function startApp() {
  initInstall();
  try { buildCatGrid(); } catch(e) { console.error('[SBP] buildCatGrid:', e); setTimeout(buildCatGrid, 100); }
  try { generate(); } catch(e) { console.warn('[SBP]', e); }
  // Set initial UI text
  const t = T[currentLang];
  setPlaceholder('userInput', t.placeholder);
  setPlaceholder('search', t.searchPlaceholder);
  setText('charCount', t.charCount(0));
  setText('headerSubtitle', t.subtitle);
  setText('resultLabel', t.resultLabel);
  setText('copyText', t.copyBtn);
  setText('clearBtn', t.clearBtn);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startApp);
} else {
  startApp();
}
</script>
</body>
</html>
